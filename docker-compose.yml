version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: wrap_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: wrap_db
      POSTGRES_USER: Gaurav
      POSTGRES_PASSWORD: Ecxu8hmd
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wrap_redis
    restart: always
    ports:
      - '63790:6379'

volumes:
  pg_data:
